# ============================================================================
# Direktor qabuli - to'liq stek: PostgreSQL (TimescaleDB) + Redis + Bot
# Ishga tushirish:
#   docker compose up --build
# ============================================================================

x-env: &common-env
  TZ: "Asia/Tashkent"
  PGTZ: "Asia/Tashkent"
  LANG: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"
  PYTHONUNBUFFERED: "1"
  POSTGRES_DB: ${POSTGRES_DB:-turnikedb}
  POSTGRES_USER: ${POSTGRES_USER:-turnikeuser}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StrongSecurePass123!}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  DB_HOST: db
  DB_PORT: 5432

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

networks:
  backend:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  pgbackups:

services:
  # ==========================================================================
  # PostgreSQL (TimescaleDB + performance tuning)
  # ==========================================================================
  db:
    image: timescale/timescaledb:2.15.2-pg16
    container_name: university_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turnikedb}
      POSTGRES_USER: ${POSTGRES_USER:-turnikeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StrongSecurePass123!}
      TZ: "Asia/Tashkent"
      PGTZ: "Asia/Tashkent"
    command:
      - postgres
      - -c
      - max_connections=500
      - -c
      - shared_buffers=2GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=1GB
      - -c
      - effective_cache_size=4GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=8GB
      - -c
      - min_wal_size=2GB
      - -c
      - wal_level=replica
      - -c
      - timescaledb.max_background_workers=32
      - -c
      - timescaledb.telemetry_level=off
      - -c
      - shared_preload_libraries=pg_stat_statements,timescaledb
      - -c
      - pg_stat_statements.max=10000
      - -c
      - pg_stat_statements.save=on
    ports:
      - "5436:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
      - pgbackups:/backups:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turnikeuser} -d ${POSTGRES_DB:-turnikedb} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [backend]
    logging: *default-logging

  # ==========================================================================
  # Redis (aiogram FSM storage)
  # ==========================================================================
  redis:
    image: redis:7.4-alpine
    container_name: university_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]
    logging: *default-logging

  # ==========================================================================
  # Telegram bot (aiogram 3)
  # ==========================================================================
  bot:
    build:
      context: ./backend/bot
      dockerfile: Dockerfile
    container_name: university_bot
    restart: unless-stopped
    env_file:
      - ./backend/bot/.env
    environment:
      <<: *common-env
      # Ollama AI - host mashinadagi Ollama serveriga ulanish
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      AI_ENABLED: ${AI_ENABLED:-true}
    extra_hosts:
      # Linux uchun host.docker.internal ni qo'llab-quvvatlash
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend]
    logging: *default-logging
