# Alembic konfiguratsiyasi.
# Ma'lumotlar bazasi URL'i env.py ichida sozlamalardan (app.config) olinadi,
# shuning uchun bu yerda sqlalchemy.url bo'sh qoldirilgan (maxfiylik uchun).

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Migratsiya fayllari uchun sana formatidagi prefiks
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
